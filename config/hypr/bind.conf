###################
### KEYBINDINGS ###
###################

bind = SUPER, Return, exec, $terminal # Terminal
bind = SUPER, Q, killactive, # Chiudi finestra attiva
bind = SUPER, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit # Menu spegnimento
bind = SUPER, E, exec, $fileManager # File manager
# bind = SUPER, V, togglefloating,
bind = SUPER, Space, exec, walker # App launcher
bind = SUPER, B, exec, ~/.config/hypr/script/launch-browser.sh # Browser
bind = SUPER SHIFT, B, exec, ~/.config/hypr/script/launch-browser.sh --private # Browser privato
bind = SUPER, P, pseudo, # Modalità pseudo tiling
bind = SUPER, J, togglesplit, # Toggle split layout

# Wallpaper
bind = SUPER, W, exec, waypaper --folder ~/Pictures/wallpapers # Selettore wallpaper

# Keybinds menu
bind = SUPER, K, exec, ~/.config/hypr/script/keybinds.sh # Mostra keybinds

# Clipboard
bind = SUPER, V, exec, $terminal --class clipse -e 'clipse' # Clipboard manager

# Lock
bind = SUPER, L, exec, pactl set-sink-mute @DEFAULT_SINK@ 1 && hyprlock # Lock schermo

# VSCode
bind = SUPER SHIFT, V, exec, code # Visual Studio Code

# Focus finestre
bind = SUPER, left, movefocus, l # Focus sinistra
bind = SUPER, right, movefocus, r # Focus destra
bind = SUPER, up, movefocus, u # Focus su
bind = SUPER, down, movefocus, d # Focus giù

# Workspace switch
bind = SUPER, 1, workspace, 1 # Workspace 1
bind = SUPER, 2, workspace, 2 # Workspace 2
bind = SUPER, 3, workspace, 3 # Workspace 3
bind = SUPER, 4, workspace, 4 # Workspace 4
bind = SUPER, 5, workspace, 5 # Workspace 5
bind = SUPER, 6, workspace, 6 # Workspace 6
bind = SUPER, 7, workspace, 7 # Workspace 7
bind = SUPER, 8, workspace, 8 # Workspace 8
bind = SUPER, 9, workspace, 9 # Workspace 9
bind = SUPER, 0, workspace, 10 # Workspace 10

# Move to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1 # Sposta a workspace 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = SUPER, S, togglespecialworkspace, magic # Toggle scratchpad
bind = SUPER SHIFT, S, movetoworkspace, special:magic # Sposta a scratchpad

# Scroll workspace
bind = SUPER, mouse_down, workspace, e+1 # Workspace successivo
bind = SUPER, mouse_up, workspace, e-1 # Workspace precedente

# Mouse move/resize
bindm = SUPER, mouse:272, movewindow # Muovi finestra
bindm = SUPER, mouse:273, resizewindow # Ridimensiona finestra

# Audio
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ # Volume su
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # Volume giù
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # Mic mute

# Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ # Luminosità su
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- # Luminosità giù

# screen shot
bind = SUPER, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot_$(date+%Y%m%d_%H%M%S).png - | wl-copy
bind = CTRL, Print, exec, grim -g "$(slurp)" - | wl-copy

# Media
bindl = , XF86AudioNext, exec, playerctl next # Traccia successiva
bindl = , XF86AudioPause, exec, playerctl play-pause # Play/Pausa
bindl = , XF86AudioPlay, exec, playerctl play-pause # Play
bindl = , XF86AudioPrev, exec, playerctl previous # Traccia precedente
