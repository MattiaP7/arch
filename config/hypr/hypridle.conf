general {
    lock_cmd = pidof hyprlock || hyprlock       # Comando per bloccare
    before_sleep_cmd = loginctl lock-session    # Blocca prima di sospendere
    after_sleep_cmd = hyprctl dispatch dpms on  # Riaccende il monitor dopo il risveglio
}

# 1. Abbassa la luminosità (Risparmio rapido)
listener {
    timeout = 150                                # 2.5 minuti
    on-timeout = brightnessctl set 10%
    on-resume = brightnessctl set 100%
}

# 2. Blocca lo schermo (Win + L automatico)
listener {
    timeout = 300                                # 5 minuti
    on-timeout = loginctl lock-session
}

# 3. Spegne il monitor (DPMS)
listener {
    timeout = 330                                # 5.5 minuti
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 4. Sospensione (S3/Sleep)
listener {
    timeout = 600                                # 10 minuti
    on-timeout = systemctl suspend
}
